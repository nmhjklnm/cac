name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -s bash -S warning \
            src/utils.sh \
            src/cmd_*.sh \
            src/dns_block.sh \
            src/mtls.sh \
            src/templates.sh \
            src/main.sh \
            build.sh

  build-check:
    name: Build consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild and check for drift
        run: |
          cp cac cac.before
          bash build.sh
          if ! diff -q cac.before cac >/dev/null 2>&1; then
            echo "::error::Built 'cac' differs from committed version. Run 'bash build.sh' and commit the result."
            diff cac.before cac || true
            exit 1
          fi
          echo "✓ Build output matches committed file"

  js-check:
    name: JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS files parse correctly
        run: |
          node --check src/relay.js
          node --check src/fingerprint-hook.js
          echo "✓ All JS files parse successfully"

  test-install:
    name: Install (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cac via npm
        run: npm install -g .

      - name: Verify cac runs
        run: cac --version
        shell: bash

      - name: Verify basic commands
        if: runner.os != 'Windows'
        run: |
          cac help
          cac env ls

  test-relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start test upstream proxy
        run: |
          node -e "
          const net = require('net');
          net.createServer((c) => {
            let b = '';
            c.on('data', (d) => {
              b += d.toString();
              if (b.indexOf('\r\n\r\n') === -1) return;
              const m = b.match(/^CONNECT\s+([^\s:]+):(\d+)\s+HTTP/i);
              if (m) {
                const s = net.connect(parseInt(m[2]), m[1], () => {
                  c.write('HTTP/1.1 200 OK\r\n\r\n');
                  c.pipe(s); s.pipe(c);
                });
                s.on('error', () => c.destroy());
              } else { c.write('HTTP/1.1 400 Bad\r\n\r\n'); c.destroy(); }
            });
            c.on('error', () => {});
          }).listen(18080, '127.0.0.1', () => {
            require('fs').writeFileSync('/tmp/test-proxy.pid', String(process.pid));
            console.log('test proxy on 127.0.0.1:18080');
          });
          " &
          sleep 1
          echo "✓ Test upstream proxy started"

      - name: Test relay forwarding
        run: |
          node src/relay.js 17890 http://127.0.0.1:18080 /tmp/relay.pid &
          sleep 1
          # Verify relay accepted the connection (curl through relay)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --proxy http://127.0.0.1:17890 --connect-timeout 5 \
            https://example.com 2>/dev/null || echo "000")
          kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          echo "HTTP code: $HTTP_CODE"
          echo "✓ Relay forwarding test complete"

      - name: Test relay 502 error logging
        run: |
          # Relay to non-existent upstream → should log error details
          node src/relay.js 17891 http://127.0.0.1:19999 /tmp/relay2.pid </dev/null >/tmp/relay2.log 2>&1 &
          sleep 1
          curl -s --proxy http://127.0.0.1:17891 --connect-timeout 3 https://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log ---"
          cat /tmp/relay2.log
          echo "--- end ---"
          # Verify error details are logged
          grep -q "502" /tmp/relay2.log && echo "✓ 502 error logged with details" || echo "⚠ 502 log not found"
          grep -q "ECONNREFUSED" /tmp/relay2.log && echo "✓ Error code logged" || echo "⚠ Error code not found"
          kill "$(cat /tmp/relay2.pid)" 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/test-proxy.pid)" 2>/dev/null || true
          kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          kill "$(cat /tmp/relay2.pid)" 2>/dev/null || true

  test-tun:
    name: TUN (mihomo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build cac
        run: bash build.sh

      - name: Download mihomo
        run: |
          MIHOMO_VER=$(curl -sL https://api.github.com/repos/MetaCubeXD/mihomo/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "mihomo version: $MIHOMO_VER"
          curl -sL "https://github.com/MetaCubeXD/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-${MIHOMO_VER}.gz" -o /tmp/mihomo.gz
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          /tmp/mihomo -v

      - name: Prepare mihomo TUN config
        run: |
          mkdir -p /tmp/mihomo-data
          cat > /tmp/mihomo-data/config.yaml << 'YAML'
          mixed-port: 7890
          mode: direct
          log-level: warning
          tun:
            enable: true
            stack: system
            auto-route: true
            auto-detect-interface: true
          dns:
            enable: true
            listen: :1053
            nameserver:
              - 8.8.8.8
          YAML

      - name: Load cac functions
        id: load
        run: |
          # Extract functions only (stop before main dispatcher)
          sed '/^\[[ $#/,$d; /^case "\$1" in/,$d' cac > /tmp/cac-functions.sh
          echo "✓ Functions extracted ($(wc -l < /tmp/cac-functions.sh) lines)"

      - name: "Test: no TUN detected before mihomo"
        run: |
          source /tmp/cac-functions.sh 2>/dev/null
          if _detect_tun_active; then
            echo "FAIL: TUN detected when none exists"; exit 1
          fi
          echo "✓ No TUN detected"

      - name: Start mihomo with TUN
        run: |
          sudo /tmp/mihomo -d /tmp/mihomo-data &
          sleep 3
          echo "--- interfaces ---"
          ip link show | grep -E 'tun|Meta'
          echo "--- routes (default) ---"
          ip route show default
          echo "--- mihomo process ---"
          pgrep -a mihomo || echo "mihomo not running!"

      - name: "Test: TUN detected after mihomo"
        run: |
          source /tmp/cac-functions.sh 2>/dev/null
          if _detect_tun_active; then
            echo "✓ TUN detected"
          else
            echo "FAIL: TUN not detected with mihomo running"
            echo "--- all interfaces ---"
            ip link show
            exit 1
          fi

      - name: "Test: route detection with TUN active"
        run: |
          source /tmp/cac-functions.sh 2>/dev/null
          REAL_GW=$(ip route show default | grep -v tun | awk '{print $3; exit}')
          echo "Real gateway: $REAL_GW"
          echo "--- current routes ---"
          ip route show
          echo ""

          # Use a fake upstream proxy IP
          TEST_PROXY="http://user:pass@10.99.99.99:1080"

          echo "=== _relay_route_ok before fix ==="
          if _relay_route_ok "$TEST_PROXY"; then
            echo "Route OK (might go via default)"
          else
            echo "✓ Route not OK — needs fix"
          fi

          echo "=== _relay_add_route ==="
          _relay_add_route "$TEST_PROXY"
          echo "--- route after fix ---"
          ip route show 10.99.99.99/32

          echo "=== _relay_route_ok after fix ==="
          if _relay_route_ok "$TEST_PROXY"; then
            echo "✓ Route fixed and verified"
          else
            echo "FAIL: route still not OK after fix"
            ip route show 10.99.99.99/32
            exit 1
          fi

      - name: "Test: relay connectivity through fixed route"
        run: |
          source /tmp/cac-functions.sh 2>/dev/null
          # Start test proxy on localhost (not affected by TUN)
          node -e "
          const net = require('net');
          net.createServer((c) => {
            let b = '';
            c.on('data', (d) => {
              b += d.toString();
              if (b.indexOf('\r\n\r\n') === -1) return;
              c.write('HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK');
              c.destroy();
            });
            c.on('error', () => {});
          }).listen(18080, '127.0.0.1', () => console.log('proxy ready'));
          " &
          sleep 1

          # Start relay pointing to localhost test proxy
          node src/relay.js 17890 http://127.0.0.1:18080 /tmp/relay.pid </dev/null >/tmp/relay.log 2>&1 &
          sleep 1

          echo "--- relay log ---"
          cat /tmp/relay.log
          echo ""

          # Test: relay should work (loopback bypasses TUN)
          RESULT=$(curl -s --proxy http://127.0.0.1:17890 --connect-timeout 5 http://example.com 2>/dev/null || echo "FAIL")
          echo "Relay result: $RESULT"
          echo "--- relay log after request ---"
          cat /tmp/relay.log
          echo ""
          echo "✓ Relay connectivity test complete (TUN active)"

      - name: "Test: ensure_route idempotent + remove_route cleanup"
        run: |
          source /tmp/cac-functions.sh 2>/dev/null
          TEST_PROXY="http://user:pass@10.99.99.99:1080"

          _relay_ensure_route "$TEST_PROXY"
          echo "✓ ensure_route idempotent (no error)"

          _relay_remove_route
          if ip route show 10.99.99.99/32 2>/dev/null | grep -q via; then
            echo "FAIL: route not removed"; exit 1
          fi
          echo "✓ Route removed"

      - name: Cleanup
        if: always()
        run: |
          sudo pkill mihomo 2>/dev/null || true
          kill "$(cat /tmp/relay.pid 2>/dev/null)" 2>/dev/null || true
          sleep 1
          echo "✓ Cleanup done"
