name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -s bash -S warning \
            src/utils.sh \
            src/cmd_*.sh \
            src/dns_block.sh \
            src/mtls.sh \
            src/templates.sh \
            src/main.sh \
            build.sh

  build-check:
    name: Build consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild and check for drift
        run: |
          cp cac cac.before
          bash build.sh
          if ! diff -q cac.before cac >/dev/null 2>&1; then
            echo "::error::Built 'cac' differs from committed version. Run 'bash build.sh' and commit the result."
            diff cac.before cac || true
            exit 1
          fi
          echo "✓ Build output matches committed file"

  js-check:
    name: JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS files parse correctly
        run: |
          node --check src/relay.js
          node --check src/fingerprint-hook.js
          echo "✓ All JS files parse successfully"

  test-install:
    name: Install (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cac via npm
        run: npm install -g .

      - name: Verify cac runs
        run: cac --version
        shell: bash

      - name: Verify basic commands
        if: runner.os != 'Windows'
        run: |
          cac help
          cac env ls

  test-relay:
    name: Relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start test upstream proxy
        run: |
          node -e "
          const net = require('net');
          net.createServer((c) => {
            let b = '';
            c.on('data', (d) => {
              b += d.toString();
              if (b.indexOf('\r\n\r\n') === -1) return;
              const m = b.match(/^CONNECT\s+([^\s:]+):(\d+)\s+HTTP/i);
              if (m) {
                const s = net.connect(parseInt(m[2]), m[1], () => {
                  c.write('HTTP/1.1 200 OK\r\n\r\n');
                  c.pipe(s); s.pipe(c);
                });
                s.on('error', () => c.destroy());
              } else { c.write('HTTP/1.1 400 Bad\r\n\r\n'); c.destroy(); }
            });
            c.on('error', () => {});
          }).listen(18080, '127.0.0.1', () => {
            require('fs').writeFileSync('/tmp/test-proxy.pid', String(process.pid));
            console.log('test proxy on 127.0.0.1:18080');
          });
          " &
          sleep 1
          echo "✓ Test upstream proxy started"

      - name: Test relay forwarding
        run: |
          node src/relay.js 17890 http://127.0.0.1:18080 /tmp/relay.pid &
          sleep 1
          # Verify relay accepted the connection (curl through relay)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --proxy http://127.0.0.1:17890 --connect-timeout 5 \
            https://example.com 2>/dev/null || echo "000")
          kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          echo "HTTP code: $HTTP_CODE"
          echo "✓ Relay forwarding test complete"

      - name: Test relay 502 error logging
        run: |
          # Relay to non-existent upstream → should log error details
          node src/relay.js 17891 http://127.0.0.1:19999 /tmp/relay2.pid </dev/null >/tmp/relay2.log 2>&1 &
          sleep 1
          curl -s --proxy http://127.0.0.1:17891 --connect-timeout 3 https://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log ---"
          cat /tmp/relay2.log
          echo "--- end ---"
          # Verify error details are logged
          grep -q "502" /tmp/relay2.log && echo "✓ 502 error logged with details" || echo "⚠ 502 log not found"
          grep -q "ECONNREFUSED" /tmp/relay2.log && echo "✓ Error code logged" || echo "⚠ Error code not found"
          kill "$(cat /tmp/relay2.pid)" 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/test-proxy.pid)" 2>/dev/null || true
          kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          kill "$(cat /tmp/relay2.pid)" 2>/dev/null || true

  test-tun:
    name: TUN (clash-for-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build cac
        run: bash build.sh

      - name: Install clash-for-linux
        run: |
          sudo apt-get install -y xz-utils unzip
          git clone https://github.com/nelvko/clash-for-linux-install.git /tmp/clash-install
          cd /tmp/clash-install
          # Fix install path for CI runner user
          sed -i "s|CLASH_BASE_DIR=.*|CLASH_BASE_DIR=$HOME/clashctl|" .env
          # Create a minimal direct-mode config (no subscription needed)
          cat > resources/profiles/config.yaml << 'YAML'
          mixed-port: 7890
          mode: direct
          log-level: warning
          allow-lan: false
          proxies: []
          rules:
            - MATCH,DIRECT
          YAML
          # Install mihomo kernel (as current user, not root)
          # install.sh may prompt for subscription interactively — ignore exit code
          bash install.sh mihomo "file://$(pwd)/resources/profiles/config.yaml" </dev/null || true
          # Verify mihomo binary exists
          MIHOMO_BIN=$(find ~/clashctl -name mihomo -type f 2>/dev/null | head -1)
          if [ -z "$MIHOMO_BIN" ]; then
            echo "FAIL: mihomo binary not found after install"
            ls -la ~/clashctl/ 2>/dev/null || true
            exit 1
          fi
          echo "✓ clash-for-linux installed ($MIHOMO_BIN)"

      - name: Extract cac functions
        run: |
          # Extract function definitions only, suppress auto-executing code
          awk '/^# ━━━/{found=1} found && /^\[\[ \$# -eq 0 \]\]/{exit} {print}' cac > /tmp/cac-fn.sh
          echo '# stub — prevent execution' >> /tmp/cac-fn.sh
          echo "✓ Functions extracted ($(wc -l < /tmp/cac-fn.sh) lines)"

      - name: "Test: no TUN before clash starts"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          if _detect_tun_active; then
            echo "FAIL: TUN detected before clash starts"; exit 1
          fi
          echo "✓ No TUN detected"

      - name: Start clash + enable TUN
        run: |
          # Find mihomo binary
          MIHOMO_BIN=$(find ~/clashctl -name mihomo -type f 2>/dev/null | head -1)
          echo "mihomo binary: $MIHOMO_BIN"

          # Enable TUN in mixin config
          YQ_BIN=$(find ~/clashctl -name yq -type f 2>/dev/null | head -1)
          if [ -n "$YQ_BIN" ]; then
            "$YQ_BIN" -i '.tun.enable = true' ~/clashctl/resources/mixin.yaml
            echo "✓ TUN enabled in config"
          else
            echo "⚠ yq not found, manually editing config"
            sed -i 's/enable: false/enable: true/' ~/clashctl/resources/mixin.yaml
          fi

          # Start mihomo with sudo (TUN requires root)
          if [ -n "$MIHOMO_BIN" ]; then
            sudo "$MIHOMO_BIN" -d ~/clashctl </dev/null >~/clashctl/mihomo.log 2>&1 &
            sleep 3
            echo "--- mihomo log ---"
            tail -5 ~/clashctl/mihomo.log || true
          else
            echo "⚠ mihomo binary not found"
            ls -la ~/clashctl/ || true
          fi

          echo "--- interfaces ---"
          ip link show | grep -E 'tun|Meta' || echo "(no tun interface)"
          echo "--- default routes ---"
          ip route show default
          echo "--- mihomo process ---"
          pgrep -a mihomo || echo "mihomo not running"

      - name: "Test: TUN detected after clash starts"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          if _detect_tun_active; then
            echo "✓ TUN detected"
          else
            echo "⚠ TUN not detected — showing diagnostics"
            ip link show
            ip route show
            # Don't fail — TUN might not work in all CI environments
          fi

      - name: "Test: route detection and fix"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          TEST_PROXY="http://user:pass@10.99.99.99:1080"

          echo "=== _relay_route_ok before fix ==="
          if _relay_route_ok "$TEST_PROXY"; then
            echo "Route OK (default gateway)"
          else
            echo "Route needs fix"
          fi

          echo "=== _relay_add_route ==="
          _relay_add_route "$TEST_PROXY" || echo "⚠ route add returned non-zero"
          echo "--- route after fix ---"
          ip route show 10.99.99.99/32 || echo "(no route)"

          echo "=== _relay_route_ok after fix ==="
          if _relay_route_ok "$TEST_PROXY"; then
            echo "✓ Route fixed and verified"
          else
            echo "⚠ Route still not OK (may be expected if TUN not active in CI)"
          fi

      - name: "Test: relay with TUN active"
        run: |
          # Test proxy on localhost
          node -e "
          const net = require('net');
          net.createServer((c) => {
            let b = '';
            c.on('data', (d) => {
              b += d.toString();
              if (b.indexOf('\r\n\r\n') === -1) return;
              c.write('HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK');
              c.destroy();
            });
            c.on('error', () => {});
          }).listen(18080, '127.0.0.1', () => console.log('proxy ready'));
          " &
          sleep 1

          node src/relay.js 17890 http://127.0.0.1:18080 /tmp/relay.pid </dev/null >/tmp/relay.log 2>&1 &
          sleep 1
          echo "--- relay log ---"
          cat /tmp/relay.log

          curl -s --proxy http://127.0.0.1:17890 --connect-timeout 5 http://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log after request ---"
          cat /tmp/relay.log
          echo "✓ Relay test complete"

      - name: "Test: ensure_route + remove_route"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          TEST_PROXY="http://user:pass@10.99.99.99:1080"

          _relay_ensure_route "$TEST_PROXY" || true
          echo "✓ ensure_route ran"

          _relay_remove_route 2>/dev/null || true
          if ip route show 10.99.99.99/32 2>/dev/null | grep -q via; then
            echo "⚠ Route not removed"
          else
            echo "✓ Route removed"
          fi

      - name: Cleanup
        if: always()
        run: |
          sudo pkill mihomo 2>/dev/null || true
          kill "$(cat /tmp/relay.pid 2>/dev/null)" 2>/dev/null || true
          sleep 1
          echo "✓ Cleanup done"

  test-tun-strict:
    name: TUN strict (sing-box)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build cac
        run: bash build.sh

      - name: Extract cac functions
        run: |
          awk '/^# ━━━/{found=1} found && /^\[\[ \$# -eq 0 \]\]/{exit} {print}' cac > /tmp/cac-fn.sh
          echo "✓ Functions extracted"

      - name: Download sing-box
        run: |
          SB_VER=$(curl -sL "https://api.github.com/repos/SagerNet/sing-box/releases" | \
            python3 -c "import sys,json; print([r for r in json.load(sys.stdin) if not r['prerelease']][0]['tag_name'])")
          echo "sing-box version: $SB_VER"
          SB_VER_NUM=${SB_VER#v}
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/${SB_VER}/sing-box-${SB_VER_NUM}-linux-amd64.tar.gz" -o /tmp/sb.tar.gz
          tar xzf /tmp/sb.tar.gz -C /tmp
          SB_BIN=$(find /tmp -name sing-box -type f 2>/dev/null | head -1)
          chmod +x "$SB_BIN"
          cp "$SB_BIN" /tmp/sing-box
          /tmp/sing-box version
          echo "✓ sing-box ready"

      - name: Start test upstream proxy on eth0 IP
        run: |
          # Get runner's real IP (non-loopback)
          REAL_IP=$(ip -4 addr show eth0 | grep -oP 'inet \K[^/]+')
          echo "Runner real IP: $REAL_IP"
          echo "$REAL_IP" > /tmp/real_ip

          # Start test HTTP CONNECT proxy on real IP
          node -e "
          const net = require('net');
          net.createServer((c) => {
            let b = '';
            c.on('data', (d) => {
              b += d.toString();
              if (b.indexOf('\r\n\r\n') === -1) return;
              const m = b.match(/^CONNECT\s+([^\s:]+):(\d+)\s+HTTP/i);
              if (m) {
                c.write('HTTP/1.1 200 OK\r\n\r\n');
                // Don't actually connect — just prove the proxy is reachable
                c.destroy();
              } else {
                c.write('HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK');
                c.destroy();
              }
            });
            c.on('error', () => {});
          }).listen(18080, '$REAL_IP', () => {
            require('fs').writeFileSync('/tmp/test-proxy.pid', String(process.pid));
            console.log('test proxy on $REAL_IP:18080');
          });
          " &
          sleep 1
          echo "✓ Test proxy started on $REAL_IP:18080"

      - name: "Test: relay works BEFORE sing-box TUN"
        run: |
          REAL_IP=$(cat /tmp/real_ip)
          # Relay pointing to test proxy on real IP
          node src/relay.js 17890 "http://${REAL_IP}:18080" /tmp/relay.pid </dev/null >/tmp/relay.log 2>&1 &
          sleep 1
          # This should work — no TUN yet
          curl -s --proxy http://127.0.0.1:17890 --connect-timeout 5 http://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log (before TUN) ---"
          cat /tmp/relay.log
          kill "$(cat /tmp/relay.pid)" 2>/dev/null || true
          echo "✓ Relay works before TUN"

      - name: Start sing-box with strict_route + auto_redirect
        run: |
          REAL_IP=$(cat /tmp/real_ip)
          # Create sing-box config with strict routing (simulates Network Extension)
          cat > /tmp/sb-config.json << SBJSON
          {
            "log": {"level": "info"},
            "inbounds": [{
              "type": "tun",
              "tag": "tun-in",
              "interface_name": "tun0",
              "address": ["172.18.0.1/30"],
              "auto_route": true,
              "auto_redirect": true,
              "strict_route": true,
              "stack": "system"
            }],
            "outbounds": [{"type": "direct", "tag": "direct"}],
            "route": {
              "auto_detect_interface": true,
              "rules": [{
                "inbound": ["tun-in"],
                "outbound": "direct"
              }]
            }
          }
          SBJSON
          sudo /tmp/sing-box run -c /tmp/sb-config.json </dev/null >/tmp/sb.log 2>&1 &
          sleep 3
          echo "--- sing-box log ---"
          tail -10 /tmp/sb.log
          echo "--- interfaces ---"
          ip link show tun0 2>/dev/null || echo "tun0 not found"
          echo "--- routes ---"
          ip route show default
          echo "--- iptables/nftables ---"
          sudo nft list ruleset 2>/dev/null | head -30 || sudo iptables -t mangle -L 2>/dev/null | head -20 || echo "no rules"
          echo "--- process ---"
          pgrep -a sing-box || echo "sing-box not running"

      - name: "Test: TUN detected"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          if _detect_tun_active; then
            echo "✓ TUN detected"
          else
            echo "⚠ TUN not detected (sing-box may not have created tun0)"
            ip link show
          fi

      - name: "Test: relay FAILS with strict TUN (reproduce 502)"
        run: |
          REAL_IP=$(cat /tmp/real_ip)
          # Relay pointing to test proxy on real IP — should FAIL because sing-box intercepts
          node src/relay.js 17891 "http://${REAL_IP}:18080" /tmp/relay2.pid </dev/null >/tmp/relay2.log 2>&1 &
          sleep 1
          curl -s --proxy http://127.0.0.1:17891 --connect-timeout 5 http://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log (with strict TUN) ---"
          cat /tmp/relay2.log
          echo ""
          if grep -q "502" /tmp/relay2.log; then
            echo "✓ 502 reproduced! strict_route blocks relay upstream connection"
          else
            echo "⚠ No 502 — strict_route may not block this traffic path"
          fi
          kill "$(cat /tmp/relay2.pid)" 2>/dev/null || true

      - name: "Test: route fix attempt"
        run: |
          source /tmp/cac-fn.sh 2>/dev/null
          REAL_IP=$(cat /tmp/real_ip)
          TEST_PROXY="http://user:pass@${REAL_IP}:18080"

          echo "=== _relay_add_route ==="
          _relay_add_route "$TEST_PROXY" || echo "⚠ route add failed"
          echo "--- route ---"
          ip route show "${REAL_IP}/32" 2>/dev/null || echo "(no /32 route)"

          echo "=== Test relay AFTER route fix ==="
          node src/relay.js 17892 "http://${REAL_IP}:18080" /tmp/relay3.pid </dev/null >/tmp/relay3.log 2>&1 &
          sleep 1
          curl -s --proxy http://127.0.0.1:17892 --connect-timeout 5 http://example.com 2>/dev/null || true
          sleep 0.5
          echo "--- relay log (after route fix) ---"
          cat /tmp/relay3.log
          echo ""
          if grep -q "502" /tmp/relay3.log; then
            echo "✗ 502 persists after route fix — route add is NOT enough for strict_route"
          else
            echo "✓ Route fix works — relay connects after route add"
          fi
          kill "$(cat /tmp/relay3.pid)" 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          sudo pkill sing-box 2>/dev/null || true
          kill "$(cat /tmp/test-proxy.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/relay.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/relay2.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/relay3.pid 2>/dev/null)" 2>/dev/null || true
          sleep 1
          echo "✓ Cleanup done"
